services:
  # Backend Service
  - type: web
    name: ai-server-digipodium
    env: node
    rootDir: ai-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://ai-portfolio-builder-digipodium.onrender.com
      - key: MONGO_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: RAZORPAY_API_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # Frontend Service (Static Site)
  - type: static
    name: ai-portfolio-builder-digipodium
    env: static
    rootDir: ai-portfolio-builder
    buildCommand: npm install && npm run build
    publishDir: out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-server-digipodium.onrender.com
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
      - key: NEXTJS_BUILD_WORKERS
        value: 1
      - key: NODE_OPTIONS
        value: --max-old-space-size=450
